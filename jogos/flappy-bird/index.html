<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Bird</title>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" type="text/css" href="./css/main.css">
    <script src="https://kit.fontawesome.com/b1609f1213.js" crossorigin="anonymous"></script>
	    
</head>
<body>
   
   <header>
        <div class="container">
            <img src="/img/logo.png" alt="our logo" class="logo">
            
            <input type="checkbox" id="toggle">
            <label for="toggle">
                <svg viewBox="0 0 100 70" class="burger-icon">
                    <rect width="100" height="15"/>
                    <rect y="30" width="100" height="15"/>
                    <rect y="60" width="100" height="15"/>
                </svg>
          
                <svg viewBox="0 0 50 50" class="exit-icon">
                    <line x1="0" y1="0" x2="50" y2="50" />
                    <line x1="50" y1="0" x2="0" y2="50" />
                </svg>
            </label>
          
            <nav class="menu">             
                <a href="https://github.com/auriom" class="menu-link fab fa-github"> </a>
                <a href="https://www.instagram.com/lukaz_oliveeira/"  class="menu-link fab fa-instagram"></a>
            </nav>
       </div>
  </header>

    
    
    <canvas id="game-canvas" width="320" height="480"></canvas>
    <style>
        body {
          min-height: 100vh;
          display: flex;
          justify-content: center;
          align-items: center;
        }
        canvas {
          border: 1px solid #000;
          display: block;
          margin: 0 auto;
        }
    </style>

    <script src="./jogo.js"></script>
</body>
</html>
